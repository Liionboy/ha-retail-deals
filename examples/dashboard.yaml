# Exemplu Dashboard — Retail Deals Romania

## Card minimalist
```yaml
type: custom:retail-deals-card
entity: sensor.retail_deals_summary
title: "🛒 Reduceri săptămânale"
max_items: 5
compact: true
```

## Card complet
```yaml
type: custom:retail-deals-card
entity: sensor.retail_deals_summary
title: "🛒 Cele mai bune reduceri"
show_stores: true
show_prices: true
show_savings: true
max_items: 10
compact: false
```

## Entities card (fără custom card)
```yaml
type: entities
title: "🛒 Reduceri Retail"
entities:
  - entity: sensor.retail_deals_summary
    name: Total oferte
  - entity: sensor.retail_deals_best
    name: Cel mai bun discount
  - entity: sensor.deals_auchan
    name: Auchan
  - entity: sensor.deals_kaufland
    name: Kaufland
  - entity: sensor.deals_lidl
    name: Lidl
  - entity: sensor.deals_carrefour
    name: Carrefour
```

